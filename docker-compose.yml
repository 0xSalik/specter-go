services:
  specter:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:8080/auth/callback}
      DATABASE_URL: postgres://specter:specter@postgres:5432/specter?sslmode=disable
      DASHBOARD_PORT: 8080
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET}
      YTDLP_PATH: yt-dlp
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: specter
      POSTGRES_PASSWORD: specter
      POSTGRES_DB: specter
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specter"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432" # Remove in production.

volumes:
  pgdata:
