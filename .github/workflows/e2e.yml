name: E2E
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Run E2E tests
        env:
          E2E_BOT_TOKEN: ${{ secrets.E2E_BOT_TOKEN }}
          E2E_TEST_GUILD_ID: ${{ secrets.E2E_TEST_GUILD_ID }}
          E2E_TEST_CHANNEL_ID: ${{ secrets.E2E_TEST_CHANNEL_ID }}
          E2E_TEST_VC_ID: ${{ secrets.E2E_TEST_VC_ID }}
          E2E_TEST_USER_ID: ${{ secrets.E2E_TEST_USER_ID }}
          TEST_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
        run: go test -race -count=1 -tags=e2e -timeout=120s ./tests/e2e/...
