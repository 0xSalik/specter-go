{{template "head" .}}
{{template "guildnav" .}}
<h1 class="text-2xl font-semibold mb-1">Autorole</h1>
<p class="text-zinc-500 text-sm mb-6">Roles assigned automatically when a member joins.</p>
{{with .Data.Config}}
<form method="post" class="space-y-5 max-w-lg">
  <label class="flex items-center gap-2"><input type="checkbox" name="enabled" {{if .Enabled}}checked{{end}}><span>Enable autorole</span></label>

  <div class="border-t border-zinc-800 pt-4">
    <label class="block text-xs text-zinc-400 mb-1">Roles for members (hold Ctrl/Cmd to select multiple)</label>
    {{$rids := .RoleIDs}}
    <select name="role_ids" multiple size="6" class="w-full bg-zinc-900 border border-zinc-700 rounded px-2 py-1">
      {{range $.Data.Roles}}<option value="{{.ID}}" {{if isin $rids .ID}}selected{{end}}>{{.Name}}</option>{{end}}
    </select>
  </div>

  <div class="border-t border-zinc-800 pt-4">
    <label class="block text-xs text-zinc-400 mb-1">Roles for bots</label>
    {{$brids := .BotRoleIDs}}
    <select name="bot_role_ids" multiple size="4" class="w-full bg-zinc-900 border border-zinc-700 rounded px-2 py-1">
      {{range $.Data.Roles}}<option value="{{.ID}}" {{if isin $brids .ID}}selected{{end}}>{{.Name}}</option>{{end}}
    </select>
  </div>

  <button class="px-4 py-2 rounded-md bg-indigo-600 hover:bg-indigo-500 font-medium">Save</button>
</form>
{{end}}
{{template "foot" .}}
