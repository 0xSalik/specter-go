{{template "head" .}}
{{template "guildnav" .}}
<h1 class="text-2xl font-semibold mb-1">{{if .Guild}}{{.Guild.Name}}{{else}}Server{{end}}</h1>
<p class="text-zinc-500 text-sm mb-6">{{.GuildID}}</p>
<div class="grid gap-3 grid-cols-2 sm:grid-cols-3">
  {{with .Data.Stats}}
  <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-4"><div class="text-2xl font-semibold">{{.Bans}}</div><div class="text-xs text-zinc-500 uppercase">Bans</div></div>
  <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-4"><div class="text-2xl font-semibold">{{.Kicks}}</div><div class="text-xs text-zinc-500 uppercase">Kicks</div></div>
  <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-4"><div class="text-2xl font-semibold">{{.Warnings}}</div><div class="text-xs text-zinc-500 uppercase">Warnings</div></div>
  <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-4"><div class="text-2xl font-semibold">{{.XPEntries}}</div><div class="text-xs text-zinc-500 uppercase">XP Entries</div></div>
  <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-4"><div class="text-2xl font-semibold">{{.QueueSize}}</div><div class="text-xs text-zinc-500 uppercase">Queue</div></div>
  <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-4"><div class="text-2xl font-semibold">{{.AuditCount}}</div><div class="text-xs text-zinc-500 uppercase">Audit Events</div></div>
  {{end}}
</div>
{{template "foot" .}}
