{{template "head" .}}
{{template "guildnav" .}}
<h1 class="text-2xl font-semibold mb-6">Mod Log Settings</h1>
<form method="post" class="space-y-2 max-w-2xl">
  <table class="w-full text-sm">
    <thead><tr class="text-left text-zinc-400"><th class="py-2">Event</th><th>Enabled</th><th>Channel Override</th></tr></thead>
    <tbody>
    {{$ovr := .Data.Overrides}}
    {{$chans := .Data.Channels}}
    {{range $et := .Data.EventTypes}}
      {{$o := index $ovr $et}}
      <tr class="border-t border-zinc-800">
        <td class="py-2 font-mono text-xs">{{$et}}</td>
        <td><input type="checkbox" name="enabled_{{$et}}" {{if $o.Enabled}}checked{{else}}{{if not $o.EventType}}checked{{end}}{{end}}></td>
        <td>
          <select name="channel_{{$et}}" class="bg-zinc-900 border border-zinc-700 rounded px-2 py-1">
            <option value="">Default</option>
            {{$sel := deref $o.ChannelID}}
            {{range $chans}}<option value="{{.ID}}" {{if eq .ID $sel}}selected{{end}}>#{{.Name}}</option>{{end}}
          </select>
        </td>
      </tr>
    {{end}}
    </tbody>
  </table>
  <button class="mt-4 px-4 py-2 rounded-md bg-indigo-600 hover:bg-indigo-500 font-medium">Save</button>
</form>
{{template "foot" .}}
